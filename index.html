<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fotografia Page</title>

    <!--CSS-->
    <link rel="stylesheet" href="assets/css/styles/styles.css">

    <!--Fontes do google-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
   <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Open+Sans:wght@300..800&display=swap"
        rel="stylesheet">
    
    

</head>
<body class="main-bg">

    <!--MENU-->
    <aside class="menu">
        <div class="container menu-content">
            
            <h1>
                <a href="#inicio">
                    <img src="assets/media/logo2.png" alt="Logo do fotógrafo">
                </a>
            </h1>

            <nav>
                <ul>
                    <li><a href="#inicio">inicio</a></li>
                    <li><a href="#sobre">sobre</a></li>
                    <li><a href="#servicos">serviços</a></li>
                    <li><a href="#portfolio">portifólio</a></li>
                    <li><a href="#contato">contato</a></li>
                </ul>
            </nav>

        </div>
    </aside>

 <section id="inicio" class="section">
  <div class="container hero">

    <!-- ESQUERDA: TÍTULO -->
    <div class="hero-text" id="heroWrap">
      <canvas id="boltCanvas"></canvas>
      <h1 class="hero-title" id="heroTitle">
        Da ideia ao impacto.
        <span class="line-2" id="line2">Em cada foto.</span>
      </h1>
      <p class="hero-sub">Audiovisual que valoriza sua marca</p>
    </div>

    <!-- DIREITA: SLIDER -->
    <div class="hero-slider-wrap">
      <div class="depth-layers">
        <div class="depth-layer"></div>
        <div class="depth-layer"></div>
      </div>
      <div class="slide-frame" id="slideFrame">
        <div class="slide active"> <!-- sua foto 1 aqui --> </div>
        <div class="slide next">  <!-- sua foto 2 aqui --> </div>
        <div class="slide behind"><!-- sua foto 3 aqui --> </div>
        <div class="slide behind"><!-- sua foto 4 aqui --> </div>
      </div>
      <div class="slide-dots" id="dots"></div>
      <div class="slide-label" id="slideLabel">01 / 04</div>
    </div>

  </div>
</section>
    <section id="sobre" class="section"></section>
    <section id="servicos" class="section"></section>
    <section id="portfolio" class="section"></section>
    <section id="contato" class="section"></section>

</body>
</html>
